{% extends "base.html" %}
{% block title %}Crear cuenta{% endblock %}
{% block content %}
<div class="contenedor" style="max-width:420px;">
    <h1 style="margin-top:1.5rem;">Crear cuenta</h1>
    <form method="post" class="panel">
        {% csrf_token %}
        {{ form.as_p }}
        <button class="btn btn-solido" type="submit">Registrarme</button>
    </form>
    <p style="color:var(--text-dim);">¿Ya tenés cuenta? <a href="{% url 'usuarios:login' %}">Iniciá sesión</a>.</p>
</div>
{% endblock %}
