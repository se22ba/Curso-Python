{% extends "base.html" %}
{% block title %}Editar mi perfil{% endblock %}
{% block content %}
<div class="contenedor" style="max-width:480px;">
    <h1 style="margin-top:1.5rem;">Editar mi perfil</h1>
    <form method="post" enctype="multipart/form-data" class="panel">
        {% csrf_token %}
        <h4 style="margin-top:0;">Datos básicos</h4>
        {{ form_datos.as_p }}
        <h4>Perfil público</h4>
        {{ form_perfil.as_p }}
        <button class="btn btn-solido" type="submit">Guardar cambios</button>
        <a class="btn btn-fantasma" href="{% url 'usuarios:perfil' user.username %}">Cancelar</a>
    </form>
</div>
{% endblock %}
