{% extends "base.html" %}
{% block title %}Eliminar incidente{% endblock %}
{% block content %}
<div class="contenedor" style="max-width:560px;">
    <h1 style="margin-top:1.5rem;">Eliminar incidente</h1>
    <p>¿Confirmás que querés eliminar <strong>{{ object.titulo }}</strong>? Esta acción no se puede deshacer.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-peligro" type="submit">Sí, eliminar</button>
        <a class="btn btn-fantasma" href="{% url 'incidentes:detalle' object.pk %}">Cancelar</a>
    </form>
</div>
{% endblock %}
